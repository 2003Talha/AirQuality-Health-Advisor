<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Air Quality Health Advisor{% endblock %}</title>
    
    <!-- Google Fonts: Outfit for a very modern, geometric tech look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            /* Premium Dark Theme Palette (Default) */
            --bg-color: #05050f;
            --sidebar-bg: rgba(13, 14, 33, 0.65);
            --card-bg: rgba(22, 24, 49, 0.5);
            --card-border: rgba(255, 255, 255, 0.08);
            
            /* Vibrant Neon Accents */
            --accent-primary: #00f2fe;
            --accent-secondary: #4facfe;
            --accent-gradient: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            
            --input-bg: rgba(0, 0, 0, 0.3);
            --input-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --brand-color: white;
            --nav-hover: rgba(255, 255, 255, 0.05);
        }

        :root[data-theme="light"] {
            /* Premium Light Theme Palette */
            --bg-color: #f0f4f8;
            --sidebar-bg: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(0, 0, 0, 0.08);
            
            --accent-primary: #00c6ff;
            --accent-secondary: #0072ff;
            --accent-gradient: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            
            --text-main: #1a202c;
            --text-muted: #718096;
            
            --input-bg: rgba(255, 255, 255, 0.5);
            --input-border: rgba(0, 0, 0, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --brand-color: #1a202c;
            --nav-hover: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Glowing Orbs in Background */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        body::before {
            width: 600px; height: 600px;
            background: rgba(79, 172, 254, 0.15);
            top: -100px; left: -100px;
        }
        body::after {
            width: 500px; height: 500px;
            background: rgba(0, 242, 254, 0.12);
            bottom: -50px; right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--card-border);
            position: fixed;
            top: 0; bottom: 0; left: 0;
            z-index: 100;
            padding: 2.5rem 1.5rem;
            transition: all 0.3s ease;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--brand-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3.5rem;
            letter-spacing: -0.5px;
        }

        .brand i {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
        }

        .nav-link {
            color: var(--text-muted);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-link:hover {
            color: var(--text-main);
            background: var(--nav-hover);
            transform: translateX(5px);
        }
        
        .nav-link.active {
            background: rgba(0, 242, 254, 0.1);
            color: var(--text-main);
            font-weight: 600;
            box-shadow: inset 3px 0 0 var(--accent-primary);
        }

        .nav-link i {
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }
        .nav-link.active i {
            color: var(--accent-primary);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 3rem 4rem;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Stunning Glass Cards */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px -5px rgba(0, 242, 254, 0.15);
            border-color: rgba(0, 242, 254, 0.3);
        }

        /* Forms Elements */
        .form-label {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background: var(--input-bg) !important;
            border: 1px solid var(--input-border) !important;
            color: var(--text-main) !important;
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: var(--input-bg) !important;
            border-color: var(--accent-primary) !important;
            box-shadow: 0 0 0 4px rgba(0, 242, 254, 0.15) !important;
            transform: translateY(-2px);
        }

        /* Button Styling */
        .btn-primary {
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            padding: 0.8rem 2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #000;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, var(--accent-secondary) 0%, var(--accent-primary) 100%);
            z-index: -1;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
            color: #000;
        }
        
        .btn-primary:hover::before {
            opacity: 1;
        }

        /* Typography */
        h2.page-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            letter-spacing: -1px;
        }
        
        p.page-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="{% url 'advisor:dashboard' %}" class="brand">
            <i class="bi bi-wind"></i>
            AirAdvisor
        </a>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'advisor:dashboard' %}">
                    <i class="bi bi-magic"></i> New Prediction
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'history' %}active{% endif %}" href="{% url 'advisor:history' %}">
                    <i class="bi bi-clock-history"></i> History
                </a>
            </li>
            <li class="nav-item mt-5">
                <a class="nav-link" href="/admin/" target="_blank">
                    <i class="bi bi-shield-lock"></i> Admin Panel
                </a>
            </li>
        </ul>
        
        <div class="mt-auto pt-5">
            <button id="themeToggle" class="btn btn-sm w-100" style="background: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border); border-radius: 12px; padding: 0.8rem;">
                <i class="bi bi-moon-stars me-2"></i> Toggle Light/Dark
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Theme Toggle Logic
        const toggleBtn = document.getElementById('themeToggle');
        const root = document.documentElement;
        
        // Check for saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            root.setAttribute('data-theme', savedTheme);
        }

        toggleBtn.addEventListener('click', () => {
            let currentTheme = root.getAttribute('data-theme');
            let newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            root.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
